<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Восстановление пароля</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body class="auth-page">
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="ru"><img src="../assets/ru-flag.png" alt="RU" width="15" height="10" /></button>
    <button class="lang-btn" data-lang="en"><img src="../assets/en-flag.png" alt="EN" width="15" height="10" /></button>
  </div>

  <div class="wrapper">
    <div class="container">
      <div class="logo"><img src="../assets/logo.png" alt="Логотип проекта" /></div>
      <form id="forgotForm">
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email..." required /></div>
        <button type="submit" class="forgot-btn">Восстановить пароль</button>
      </form>
      <div class="bottom-link"><a href="/login.html">Вернуться ко входу</a></div>
    </div>
    <div class="footer">
      <div class="footer-content">
        <span class="copyright">2026 Jeos. All rights reserved.</span>
        <div class="footer-links">
          <a href="/terms.html">Terms of Use</a>
          <a href="/privacy.html">Privacy Policy</a>
          <a href="/contact.html">Contact Us</a>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../scripts/auth.js"></script>
</body>
</html>
