<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body class="auth-page">
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="ru"><img src="../assets/ru-flag.png" alt="RU" width="15" height="10" /></button>
    <button class="lang-btn" data-lang="en"><img src="../assets/en-flag.png" alt="EN" width="15" height="10" /></button>
  </div>

  <div class="wrapper">
    <div class="container">
      <div class="logo"><img src="../assets/logo.png" alt="Логотип проекта" /></div>
      <div class="top-links">
        <a href="/forgot-password.html" class="forgot-link">Забыл пароль?</a>
        <a href="/register.html" class="register-link">Зарегистрироваться</a>
      </div>
      <form id="loginForm">
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Введите email..." required /></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Введите пароль..." required /></div>
        <div class="checkbox-group"><label><input type="checkbox" id="agree" required /><span>Я принимаю пользовательское соглашение Terms of Service и политику конфиденциальности проекта.</span></label></div>
        <button type="submit">Войти</button>
      </form>
    </div>
    <div class="footer">
      <div class="footer-content">
        <span class="copyright">2026 Jeos. All rights reserved.</span>
        <div class="footer-links">
          <a href="/terms.html">Terms of Use</a>
          <a href="/privacy.html">Privacy Policy</a>
          <a href="/contact.html">Contact Us</a>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../scripts/auth.js"></script>

// авторизация(пока, что временно так сделал)
<script>
document.getElementById('login-form')?.addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('http://localhost:8000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: email, password })
        });

        const data = await response.json();

        if (response.ok) {
            alert('✅ Успешный вход!');
            window.location.href = data.redirect || 'dashboard.html';
        } else {
            alert('❌ Ошибка: ' + data.detail);
        }
    } catch (error) {
        alert('❌ Ошибка соединения с сервером');
        console.error(error);
    }
});
</script>

</body>
</html>
