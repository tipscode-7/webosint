<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <!-- Переключатель языков (слева) -->
  <div class="lang-switcher">
    <button class="lang-btn" data-lang="ru">
      <img src="../assets/ru-flag.png" alt="RU" width="15" height="10" />
    </button>
    <button class="lang-btn" data-lang="en">
      <img src="../assets/en-flag.png" alt="EN" width="15" height="10" />
    </button>
  </div>

  <!-- Кнопка выхода (справа) -->
  <button class="logout-top-btn" id="logoutTopBtn">
    <i class="fas fa-sign-out-alt"></i>
  </button>

  <div class="wrapper">
    <div class="container">
      <div class="logo">
        <img src="../assets/logo.png" alt="Логотип проекта" />
      </div>

      <div class="social-login">
        <div class="social-icon" data-platform="google">
          <img src="../assets/google-icon.png" alt="Google" />
        </div>
        <div class="social-icon" data-platform="vk">
          <img src="../assets/vk-icon.png" alt="VK" />
        </div>
        <div class="social-icon" data-platform="discord">
          <img src="../assets/discord-icon.png" alt="Discord" />
        </div>
        <div class="social-icon" data-platform="telegram">
          <img src="../assets/telegram-icon.png" alt="Telegram" />
        </div>
      </div>

      <form id="registerForm">
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Введите email..." required />
        </div>
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Введите логин..." required />
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Введите пароль..." required />
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password2" placeholder="Повторите пароль..." required />
        </div>

        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="agree" required />
            <span>Я принимаю пользовательское соглашение Terms of Service и политику конфиденциальности проекта.</span>
          </label>
        </div>

        <button type="submit" class="register-btn">Зарегистрироваться</button>
      </form>

      <div class="bottom-link">
        <a href="/login.html">Уже есть аккаунт?</a>
      </div>
    </div>

    <div class="footer">
      <div class="footer-content">
        <span class="copyright">2026 Jeos. All rights reserved.</span>
        <div class="footer-links">
          <a href="/terms.html">Terms of Use</a>
          <a href="/privacy.html">Privacy Policy</a>
          <a href="/contact.html">Contact Us</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../scripts/auth.js"></script>
</body>
</html>
