<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <!-- Логотип -->
      <div class="logo">
        <img src="../assets/logo.png" alt="Логотип проекта" />
      </div>

      <!-- Блок с иконками соцсетей (расстояние 50px) -->
      <div class="social-login">
        <div class="social-icon" data-platform="google">
          <img src="../assets/google-icon.png" alt="Google" />
        </div>
        <div class="social-icon" data-platform="vk">
          <img src="../assets/vk-icon.png" alt="VK" />
        </div>
        <div class="social-icon" data-platform="discord">
          <img src="../assets/discord-icon.png" alt="Discord" />
        </div>
        <div class="social-icon" data-platform="telegram">
          <img src="../assets/telegram-icon.png" alt="Telegram" />
        </div>
      </div>

      <form id="registerForm">
        <input type="email" id="email" placeholder="Email..." required />
        <input type="password" id="password" placeholder="Password..." required />
        <input type="password" id="password2" placeholder="Password again..." required />

        <!-- Чекбокс соглашения -->
        <div class="checkbox-group">
          <label>
            <input type="checkbox" id="agree" required />
            <span>Я принимаю пользовательское соглашение Terms of Service и политику конфиденциальности проекта.</span>
          </label>
        </div>

        <!-- Кнопка с классом register-btn -->
        <button type="submit" class="register-btn">Зарегистрироваться</button>
      </form>

      <!-- Ссылка "Уже есть аккаунт?" -->
      <div class="bottom-link">
        <a href="/login.html">Уже есть аккаунт? Войти</a>
      </div>
    </div>

    <!-- Футер -->
    <div class="footer">
      <div class="footer-content">
        <span class="copyright">2026 Jeos. All rights reserved.</span>
        <div class="footer-links">
          <a href="/terms.html">Terms of Use</a>
          <a href="/privacy.html">Privacy Policy</a>
          <a href="/contact.html">Contact Us</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../scripts/auth.js"></script>
</body>
</html>
