<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель управления</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>
<body>
  <!-- Кнопка выхода (справа в углу) -->
  <button class="logout-top-btn" id="logoutTopBtn">
    <i class="fas fa-sign-out-alt"></i>
  </button>

  <div class="dashboard-wrapper">
    <!-- Верхняя панель: профиль (горизонтально) -->
    <div class="dashboard-topbar">
      <div class="profile-section">
        <img src="../assets/profile-icon.png" alt="Profile" class="profile-avatar" />
        <div class="user-info">
          <div class="username">Иван Петров</div>
          <div class="user-role">Администратор</div>
          <div class="session-time" id="sessionTime">session: 0h:0min:0sec</div>
        </div>
      </div>
    </div>

    <!-- Ряд кнопок меню -->
    <div class="top-actions">
      <button class="top-btn menu-btn active" data-page="main">
        <i class="fas fa-home"></i>
        <span>Главное меню</span>
      </button>
      <button class="top-btn menu-btn" data-page="search">
        <i class="fas fa-search"></i>
        <span>Поиск</span>
      </button>
      <button class="top-btn menu-btn" data-page="history">
        <i class="fas fa-history"></i>
        <span>История</span>
      </button>
      <button class="top-btn menu-btn" data-page="subscriptions">
        <i class="fas fa-credit-card"></i>
        <span>Подписки</span>
      </button>
      <button class="top-btn menu-btn" data-page="settings">
        <i class="fas fa-cog"></i>
        <span>Настройки</span>
      </button>
    </div>

    <!-- Центральная область (контент) -->
    <div class="center-content" id="content-area">
      <!-- Сюда будет рендериться содержимое -->
    </div>

    <!-- Версия внизу -->
    <div class="main-version">Version BETA:0.0.01.</div>
  </div>

  <script type="module" src="../scripts/dashboard.js"></script>
</body>
</html>
